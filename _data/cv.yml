cv:
  name: Mohsin Siddiqui
  label: Applied AI Researcher | RAG · Machine Unlearning · Responsible Deployment
  email: siddiqmohsin@gmail.com
  location: Auckland, New Zealand
  image: ""
  summary: >-
    I work at the boundary between AI research and real-world enterprise deployment, most interested
    in what makes AI systems trustworthy in practice, not merely capable. I spent two decades taking
    emerging technology into regulated industries: a national EV-charging business built inside New
    Zealand's utility sector, a governance training firm scaled to €5M ARR across three continents,
    and executive advisory at KPMG. Two years ago I went back to the lab. A First Class Honours
    Master of Artificial Intelligence later, my research runs across deep learning and NLP to where
    models meet their limits: removing concepts from trained models without retraining them, and
    representing knowledge so that retrieval can be trusted. I build and run the systems myself,
    end-to-end, on open-source models. The discipline throughout is the same: evaluation,
    constraints, and controllability, in service of AI that is safe, well-governed, and genuinely
    beneficial when enterprises hand it real work.

