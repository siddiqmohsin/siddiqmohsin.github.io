        highlights:
          - "Co-authored a retraining-free machine unlearning framework: conceptual framework, foundational theory (boundary ambiguity, erasure creep), and retain-aware Mahalanobis projection — model-agnostic, validated on GPT-2 and Stable Diffusion v1.5. Directly safety-relevant: removing concepts from deployed models without retraining."

