  sections:
    Applied AI & LLM Systems:
      - company: Independent Applied AI Research
        position: Multi-Perspective OSINT Analysis Platform — sole designer & builder
        location: Auckland, New Zealand
        start_date: 2026
        end_date: present
        highlights:
          - "Research platform for multi-perspective analysis of open-source geopolitical commentary: 38 author-specific RAG corpora (~66,000 chunks) convened as an analyst panel — perspective-conditioned hybrid retrieval (dense + BM25), corpus-derived stance-aware knowledge graph, synthesis surfacing convergence, tension & outliers with full provenance."
          - "Controllability engineered as a research object: provenance-gated grounding, threshold-bounded autonomous monitoring, claim-level evidence register with per-analyst calibration scorecards. Python · SQLite · ChromaDB · FastAPI · local open-source models."

      - company: University of Auckland
        position: Masters Thesis — Legal RAG under Regulatory Constraint (A+, First Class Honours)
        location: Auckland, New Zealand
        start_date: 2025
        end_date: 2026
        summary: '"Retrieval Augmented Generation for New Zealand Social Law in a Data-Scarce Scenario" — supervised by Dr. Qian Liu'
        highlights:
          - "Grounded, citation-aware RAG over NZ statutory law: section-aware semantic chunking (ChuLo Lite v2) with hybrid FAISS + BM25 retrieval, evaluated across a 5-experiment ablation — precision 0 → 33%, recall 0 → 50% over a naive dense baseline."
          - "Core finding: segmentation and retrieval design are core determinants of legal AI trustworthiness — effective legal AI does not depend solely on larger models, but on disciplined engineering of the representations that feed them."

      - company: Machine Unlearning Research (with Austin Fu)
